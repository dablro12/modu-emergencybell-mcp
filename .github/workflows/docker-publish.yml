name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://modu-emergencybell-mcp.playmcp-endpoint.kakaocloud.io' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.sha }}
          build-args: |
            DATA_GO_KR_SERVICE_KEY=${{ secrets.DATA_GO_KR_SERVICE_KEY }}
            DATA_GO_KR_SERVICE_KEY_ENCODED=${{ secrets.DATA_GO_KR_SERVICE_KEY_ENCODED }}
            ODCLOUD_SERVICE_KEY=${{ secrets.ODCLOUD_SERVICE_KEY }}
            ODCLOUD_SERVICE_KEY_ENCODED=${{ secrets.ODCLOUD_SERVICE_KEY_ENCODED }}
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
            JUSO_CONFM_KEY=${{ secrets.JUSO_CONFM_KEY }}
            JUSO_ENG_CONFM_KEY=${{ secrets.JUSO_ENG_CONFM_KEY }}
            SAFE182_AUTH_ID=${{ secrets.SAFE182_AUTH_ID }}
            SAFE182_AUTH_KEY=${{ secrets.SAFE182_AUTH_KEY }}
            PUBLIC_BASE_URL=${{ env.PUBLIC_BASE_URL }}
