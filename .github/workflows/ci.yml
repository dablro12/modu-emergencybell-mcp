name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pytest pytest-asyncio

      - name: Build restroom index
        run: python source/scripts/process_restroom_data.py

      - name: Run tests
        env:
          DATA_GO_KR_SERVICE_KEY: ""
          DATA_GO_KR_SERVICE_KEY_ENCODED: ""
        run: pytest source/tests/ -q --ignore=source/tests/test_juso_client.py -m "not live"
